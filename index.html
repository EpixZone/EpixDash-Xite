<!DOCTYPE html>

<html>

<head>
    <title>Welcome to EpixNet!</title>
    <meta charset="utf-8">
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <link rel="stylesheet" href="css/all.css?site_modified={site_modified}" />
    <base href="" target="_top" id="base">
    <script>base.href = document.location.href.replace("/media", "").replace("index.html", "").replace(/[&?]wrapper=False/, "").replace(/[&?]wrapper_nonce=[A-Za-z0-9]+/, "")</script>
</head>

<body id="PageSites" class="{themeclass}">

    <div id="Trigger"></div>

    <!-- Left -->

    <div class="left" id="left">
        <div id="Head"></div>

        <div class="PageFiles-container">
            <div class="PageFiles" id="PageFiles"></div>
        </div>
        <div class="NetworkStats-container">
            <div class="NetworkStats" id="NetworkStats"></div>
        </div>
        <div class="SiteList" id="SiteList"></div>

    </div>


    <!-- Right -->

    <div class="right">
        <div id="Dashboard"></div>
        <div id="MuteList"></div>
        <div id="ConsoleList"></div>
        <div class="FeedList" id="FeedList"></div>
    </div>

    <!-- Libraries -->
    <script type="text/javascript" src="js/lib/maquette.js"></script>
    <script type="text/javascript" src="js/lib/marked.min.js"></script>
    <script type="text/javascript" src="js/lib/epixframe.js"></script>

    <!-- Utilities -->
    <script type="text/javascript" src="js/utils/LogMixin.js"></script>
    <script type="text/javascript" src="js/utils/Deferred.js"></script>
    <script type="text/javascript" src="js/utils/Dollar.js"></script>
    <script type="text/javascript" src="js/utils/Prototypes.js"></script>
    <script type="text/javascript" src="js/utils/Animation.js"></script>
    <script type="text/javascript" src="js/utils/ItemList.js"></script>
    <script type="text/javascript" src="js/utils/Menu.js"></script>
    <script type="text/javascript" src="js/utils/RateLimit.js"></script>
    <script type="text/javascript" src="js/utils/RateLimitCb.js"></script>
    <script type="text/javascript" src="js/utils/Text.js"></script>
    <script type="text/javascript" src="js/utils/Time.js"></script>
    <script type="text/javascript" src="js/utils/Translate.js?lang={lang}"></script>

    <!-- PageFiles -->
    <script type="text/javascript" src="js/SiteFiles.js"></script>
    <script type="text/javascript" src="js/Bigfiles.js"></script>
    <script type="text/javascript" src="js/FilesResult.js"></script>
    <script type="text/javascript" src="js/PageFiles.js"></script>

    <!-- PageSites -->
    <script type="text/javascript" src="js/Site.js"></script>
    <script type="text/javascript" src="js/SiteList.js"></script>
    <script type="text/javascript" src="js/Dashboard.js"></script>
    <script type="text/javascript" src="js/FeedList.js"></script>
    <script type="text/javascript" src="js/MuteList.js"></script>
    <script type="text/javascript" src="js/ConsoleList.js"></script>
    <script type="text/javascript" src="js/Trigger.js"></script>

    <!-- NetworkStats -->
    <script type="text/javascript" src="js/Chart.js"></script>
    <script type="text/javascript" src="js/ChartBig.js"></script>
    <script type="text/javascript" src="js/ChartLegend.js"></script>
    <script type="text/javascript" src="js/ChartRadar.js"></script>
    <script type="text/javascript" src="js/ChartTimeline.js"></script>
    <script type="text/javascript" src="js/ChartWorld.js"></script>
    <script type="text/javascript" src="js/NetworkStats.js"></script>
    <script type="text/javascript" src="js/StatList.js"></script>

    <!-- Main app (last) -->
    <script type="text/javascript" src="js/Head.js"></script>
    <script type="text/javascript" src="js/EpixDash.js"></script>
    <style id="style-live"></style>
</body>

</html>
